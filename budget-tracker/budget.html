<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bdget Tracker</title>
    <link rel="stylesheet" href="budget.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <h2> Budget Tracker</h2>
        <div class="error-message">
            <p>Plaese Enter Budget Amount | More than 0</p>
        </div>
        <div class="budget-content">
        <div class="ur-budget">
            <form>
                <label for="budget">Your Budget:</label>
                <input type="number" placeholder="Enter Your Budget" class="budget-input" required>
                <button class="btn" id="btn-budget" type="button">calculate</button>
                <select id="category-select" required>
                    <option value=""disabled selected>Select Type</option>
                    <option value="Income" class="add-income">Income</option>
                    <option value="Expenses" class="sub-expense">Expenses</option>
                </select>
            </form>
        </div>
        <div class="ur-expense">
            <form>
                <label for="expense">Expense Detail:</label>
                <input type="text" placeholder="Transaction Detail" class="expenses-input" required>
                <input type="number" placeholder="Amount" class="expenses-amount" required>
                <button class="btn" id="btn-expenses" type="button ">Add Expenses</button>
            </form>
        </div>
    </div>
    <!--cards start-->
    <ur class="cards">
        <li>
            <i class="bx bx-money"></i>
            <span class="info">
            <h3><span>$</span><span class="budget-card">5,525</span></h3>
            <p>Budget</p>
            </span>
        </li>
        <li>
            <i class="bx bx-credit-card"></i>
            <span class="info">
            <h3><span>$</span><span class="expenses-card">3,525</span></h3>
            <p>Expenses</p>
            </span>
        </li>
        <li>
            <i class="bx bx-dollar"></i>
            <span class="info">
            <h3><span>$</span><span class="balance-card">1,525</span></h3>
            <p>Balance</p>
            </span>
        </li>
    </ur>
    <!--cards ends-->

      <div class="table-content">
        <h3>Budget Detail</h3>
        <div class="table-data">
            <!-- <ul class="tbl-tr-content">
                <li>1</li>
                <li>Gaming keyboard</li>
                <li><span>$</span>600</li>
                <li>
                    <button type="button" class="btn-edit">Edit</button>
                    <button type="button" class="btn-delete">Delete</button>
                </li> 
            </ul> -->
        </div>
      </div> 
    </div>
    <script src="script.js"></script>

    
        <div class="col-3">
            <div class="card">
                <div class="body-card">
                    <h1> Budget Tracker</h1>
                    <hr>
                    <div>
                        <canvas id="myChart"></canvas>
                      </div>
                      
                </div>
            </div>
        </div>
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
        <script src="script.js"></script>
    
    
        <script>
            const ctx = document.getElementById('myChart').getContext('2d');
          
           let myChart = new Chart(ctx,{

            type:'pie',
            data:{
                labels:['Expenses', 'Budget', 'Balance'],
                datasets:[{
                    label:'Budget Tracker',
                    data:[0,0,0],
                    backgroundColor:['#3357FF', '#33FF57', '#FF5733'],
                    borderWidth:1
                }]
            },
            potions:{
                responsive:true,
                plugins:{
                    legend:{
                        position:'top'
                    }
                }
            }
           });

          </script>

</body>
</html>
