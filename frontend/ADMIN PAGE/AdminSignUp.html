<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Auth</title>
  <link rel="stylesheet" href="AdminSignUp.css">
</head>

<body>

<!-- ================= SIGN UP ================= -->
<div class="container">

  <div class="title">Bookie Hostel</div>

  <div class="card">

    <div class="close">X</div>

    <!-- SWITCH -->
    <div class="switch">
      <button class="active">Sign Up</button>
      <button id="openLogin">Log In</button>
    </div>

    <div class="form">
      <div class="row">
        <input id="firstName" type="text" placeholder="First Name">
<input id="lastName" type="text" placeholder="Last Name">
      </div>

      <input id="email" class="full" type="email" placeholder="Someone@example.com">
<input id="password" class="full" type="password" placeholder="Password">

      <button id="signupBtn" class="submit-btn">Sign Up</button>
    </div>

  </div>
</div>


<!-- ================= LOGIN MODAL ================= -->
<div id="loginModal" class="modal">

  <div class="modal-content">

    <div class="close" id="closeLogin">X</div>

    <!-- SWITCH -->
    <div class="switch">
      <button id="backToSignup">Sign up</button>
      <button class="active">Log In</button>
    </div>

    <!-- LOGIN FORM -->
    <div class="form">
      <input id="loginEmail" class="full" type="email" placeholder="Someone@example.com">
      <input id="loginPassword" class="full" type="password" placeholder="Password">

      <button id="loginBtn" class="submit-btn">Log In</button>
    </div>

  </div>

</div>

<script src="AdminSignUp.js"></script>

</body>
</html>
