<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Dashboard</title>
  <link rel="stylesheet" href="../css/Bookings.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- HAMBURGER -->
<button class="hamburger" id="hamburger" aria-label="Toggle menu">
  <i class="fas fa-bars"></i>
</button>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

  <h2 class="logo">Bookie</h2>

  <div class="profile">
    <div class="avatar">
      <i class="fas fa-user"></i>
    </div>
    <h3 id="username"></h3>
    <p>Student</p>
  </div>

  <!-- onclick on <li> directly — same pattern as working admin dashboard -->
  <ul class="menu">
    <li class="active" onclick="window.location.href='#'">
      <i class="fas fa-th-large"></i> Bookings
    </li>
    <li onclick="window.location.href='Rooms.html'">
      <i class="fas fa-bed"></i> Rooms
    </li>
    <li onclick="window.location.href='LandingPage.html'">
      <i class="fas fa-home"></i> Home
    </li>
  </ul>

  <button id="remove-user" class="logout">
    <i class="fas fa-sign-out-alt"></i> Logout
  </button>

</div>

<!-- MAIN -->
<div class="main">
  <h2>My Bookings</h2>
  <div id="dashboardContainer"></div>
</div>

<script src="../js/Dasboard.js"></script>
</body>
</html>
